<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vishnupriya Dutta — resume.sh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050805;
    --bg-2: #0a110b;
    --bg-3: #0e160f;
    --fg: #c6f5d2;
    --green: #6fff8e;
    --green-soft: #4dd97a;
    --green-dim: #2a5c3a;
    --green-ghost: #14301d;
    --c-cyan: #7df9f9;
    --c-amber: #ffd28a;
    --c-violet: #c5a6ff;
    --c-rose: #ff9bb3;
    --line: rgba(111, 255, 142, 0.18);
    --line-strong: rgba(111, 255, 142, 0.35);
    --mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: radial-gradient(ellipse at center, #07120a 0%, #030604 70%, #000 100%);
    color: var(--fg);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.55;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--green); text-decoration: none; border-bottom: 1px dotted var(--green-dim); }
  a:hover { color: #fff; border-bottom-color: var(--green); }

  /* ─── CRT overlays ─── */
  .screen { position: relative; min-height: 100vh; padding: 32px 24px 48px; }
  .crt-overlay,
  .scanlines,
  .vignette { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }
  .scanlines {
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.22) 3px,
      rgba(0,0,0,0) 4px
    );
    mix-blend-mode: multiply;
    opacity: 0.55;
  }
  .crt-overlay {
    background:
      radial-gradient(ellipse at center, rgba(111,255,142,0.05) 0%, transparent 60%),
      linear-gradient(rgba(111,255,142,0.015), rgba(111,255,142,0.015));
    animation: flicker 7s infinite steps(80);
  }
  .vignette {
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
  }
  @keyframes flicker {
    0%, 100% { opacity: 0.95; }
    20% { opacity: 0.85; }
    21% { opacity: 0.92; }
    50% { opacity: 0.97; }
    72% { opacity: 0.88; }
    73% { opacity: 0.93; }
  }

  /* ─── window ─── */
  .window {
    max-width: 1080px;
    margin: 0 auto;
    background:
      linear-gradient(180deg, rgba(111,255,142,0.02), rgba(111,255,142,0) 18%),
      var(--bg);
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.6),
      0 0 60px rgba(111,255,142,0.07),
      inset 0 0 80px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
  }

  .title-bar {
    display: grid;
    grid-template-columns: 80px 1fr 200px;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #0c130d, #070b07);
    user-select: none;
  }
  .tb-dots { display: flex; gap: 7px; }
  .tb-dots .d { width: 11px; height: 11px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }
  .d1 { background: #ff5f56; }
  .d2 { background: #ffbd2e; }
  .d3 { background: #27c93f; }
  .tb-title { text-align: center; font-size: 12px; color: #8fb59a; letter-spacing: 0.04em; }
  .tb-file { color: var(--green); }
  .tb-actions { display: flex; justify-content: flex-end; }
  .dl-btn {
    font: inherit;
    background: transparent;
    color: var(--green);
    border: 1px solid var(--green-dim);
    border-radius: 4px;
    padding: 5px 12px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: 120ms;
  }
  .dl-btn:hover {
    background: var(--green);
    color: var(--bg);
    border-color: var(--green);
    box-shadow: 0 0 16px rgba(111,255,142,0.4);
  }

  .content { padding: 28px 36px 40px; min-height: 460px; }

  .status-bar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
    padding: 7px 16px;
    font-size: 11px;
    color: #6b8a73;
    border-top: 1px solid var(--line);
    background: #060a06;
    letter-spacing: 0.04em;
  }
  .sb-right { text-align: right; }
  .sb-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    margin-right: 6px;
    vertical-align: middle;
  }

  /* ─── boot ─── */
  .boot { min-height: 420px; padding: 20px 6px; cursor: pointer; position: relative; }
  .boot-pre {
    margin: 0;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--green);
    text-shadow: 0 0 10px rgba(111,255,142,0.5);
    white-space: pre-wrap;
  }
  .boot-line { min-height: 22px; }
  .boot-skip {
    position: absolute;
    bottom: 8px; right: 6px;
    font-size: 11px; color: #5b7a63; letter-spacing: 0.05em;
  }
  .cursor {
    display: inline-block;
    color: var(--green);
    animation: blink 1s steps(2) infinite;
    text-shadow: 0 0 10px var(--green);
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ─── ascii art ─── */
  .ascii-art {
    font-family: var(--mono);
    color: var(--green);
    text-shadow: 0 0 8px rgba(111,255,142,0.35);
    font-size: 11px;
    line-height: 1.15;
    margin: 4px 0 28px;
    white-space: pre;
    overflow-x: auto;
  }

  /* ─── prompt ─── */
  .prompt-line { font-family: var(--mono); display: inline-flex; flex-wrap: wrap; }
  .p-user { color: var(--green); }
  .p-at, .p-colon, .p-dollar { color: #6b8a73; }
  .p-host { color: var(--c-cyan); }
  .p-path { color: var(--c-amber); }
  .p-cmd { color: #e8ffee; font-weight: 500; }

  /* ─── section ─── */
  .section { margin: 0 0 28px; opacity: 0; transform: translateY(6px); transition: 400ms; }
  .section.in { opacity: 1; transform: none; }
  .section-head {
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--line);
    margin-bottom: 14px;
  }
  .section-body { padding-left: 2px; }

  /* ─── summary ─── */
  .summary {
    font-size: 14px;
    color: var(--fg);
    max-width: 820px;
    line-height: 1.65;
    padding: 4px 0;
  }
  .summary .kw { color: var(--green-dim); }

  /* ─── contact ─── */
  .contact-card {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 22px 24px;
    background:
      linear-gradient(180deg, rgba(111,255,142,0.025), transparent),
      rgba(255,255,255,0.005);
  }
  .contact-grid {
    display: grid;
    grid-template-columns: 220px 1fr auto;
    gap: 28px;
    align-items: center;
  }
  .photo-wrap { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .ascii-frame {
    position: relative;
    width: 200px; height: 240px;
    padding: 0;
    z-index: 10000; /* lift above CRT scanlines + vignette so the photo stays crisp */
    isolation: isolate;
  }
  .ascii-frame img { image-rendering: auto; }
  .headshot-img {
    width: 100%; height: 100%; display: block;
    object-fit: cover;
    background: #08120a;
  }
  .frame-tl, .frame-tr, .frame-bl, .frame-br {
    position: absolute; color: var(--green); font-family: var(--mono);
    font-size: 14px; line-height: 1;
  }
  .frame-tl { top: -8px; left: -6px; }
  .frame-tr { top: -8px; right: -6px; }
  .frame-bl { bottom: -8px; left: -6px; }
  .frame-br { bottom: -8px; right: -6px; }
  .photo-cap { font-size: 10px; color: #5b7a63; letter-spacing: 0.04em; }

  .contact-dl { margin: 0; display: grid; gap: 8px; }
  .contact-dl > div { display: grid; grid-template-columns: 96px 1fr; gap: 12px; align-items: baseline; }
  .contact-dl dt { color: var(--green); font-size: 12px; text-transform: lowercase; letter-spacing: 0.04em; font-weight: 700; }
  .contact-dl dd { margin: 0; color: var(--fg); font-size: 14px; }
  .blink-dot { color: var(--green); animation: blink 1.4s steps(2) infinite; margin-right: 4px; }

  .qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .qr {
    color: var(--green);
    background: var(--bg-2);
    padding: 8px;
    border: 1px solid var(--green-dim);
    border-radius: 4px;
    display: inline-block;
    line-height: 0;
    box-shadow: 0 0 14px rgba(111,255,142,0.12);
  }
  .qr svg { display: block; }
  .qr-cap { font-size: 10px; color: #5b7a63; letter-spacing: 0.04em; }

  /* ─── skills ─── */
  .skills { display: grid; gap: 10px; }
  .skills-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 16px;
    align-items: baseline;
  }
  .skills-cat { color: var(--c-amber); font-size: 13px; }
  .skills-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    display: inline-block;
    padding: 3px 9px;
    border: 1px solid var(--green-dim);
    border-radius: 3px;
    font-size: 12px;
    color: var(--fg);
    background: rgba(111,255,142,0.04);
    line-height: 1.4;
  }

  /* ─── experience ─── */
  .xp { display: grid; gap: 22px; }
  .xp-item { border-left: 2px solid var(--green-ghost); padding-left: 16px; position: relative; }
  .xp-item::before {
    content: "▸";
    position: absolute;
    left: -10px; top: 1px;
    color: var(--green);
    background: var(--bg);
    padding: 0 2px;
    font-size: 12px;
  }
  .xp-head {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: baseline;
    margin-bottom: 2px;
  }
  .xp-role { color: var(--green); font-weight: 600; }
  .xp-at { color: var(--green-dim); }
  .xp-org { color: var(--fg); font-weight: 500; }
  .xp-date {
    margin-left: auto;
    color: var(--c-cyan);
    font-size: 12px;
    letter-spacing: 0.03em;
  }
  .xp-where { color: #c6f5d2; font-size: 12px; margin-bottom: 8px; font-weight: 700; }
  .xp-bullets { list-style: none; padding: 0; margin: 0; display: grid; gap: 4px; }
  .xp-bullets li { color: var(--fg); font-size: 13px; line-height: 1.6; padding-left: 18px; position: relative; }
  .xp-bullets .bul { position: absolute; left: 0; color: var(--green-soft); }

  /* ─── projects ─── */
  .proj-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  .proj {
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 14px 16px;
    background: rgba(111,255,142,0.018);
    transition: 160ms;
  }
  .proj:hover {
    border-color: var(--green-dim);
    background: rgba(111,255,142,0.045);
    box-shadow: 0 0 18px rgba(111,255,142,0.08);
  }
  .proj-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .proj-lang { font-size: 11px; }
  .proj-name { color: var(--green); font-weight: 600; font-size: 13px; }
  .proj-desc { margin: 0; font-size: 12.5px; color: var(--fg); line-height: 1.55; }

  /* ─── education ─── */
  .edu-row { display: grid; gap: 4px; padding: 8px 0; }
  .edu-school { color: var(--green); font-weight: 600; }
  .edu-where { color: #7d9a85; font-size: 13px; }
  .edu-meta { color: var(--fg); font-size: 13px; }
  .sep { color: var(--green-dim); }

  /* ─── awards ─── */
  .awards-tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .awards-tbl tr { border-bottom: 1px dotted var(--green-ghost); }
  .awards-tbl tr:last-child { border-bottom: none; }
  .awards-tbl td { padding: 7px 4px; vertical-align: top; }
  .aw-y { color: var(--c-cyan); width: 60px; font-size: 12px; }
  .aw-k { color: var(--green); width: 280px; }
  .aw-v { color: var(--fg); }

  /* ─── competitions ─── */
  .comps { display: grid; gap: 14px; }
  .comp {
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 14px 18px;
    background: rgba(125,249,249,0.02);
  }
  .comp-head { display: flex; flex-wrap: wrap; gap: 10px; align-items: baseline; margin-bottom: 4px; }
  .comp-name { color: var(--green); font-weight: 600; }
  .comp-date { color: var(--c-cyan); font-size: 12px; margin-left: auto; }
  .comp-detail { margin: 4px 0 10px; font-size: 13px; color: var(--fg); }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px;
    border: 1px solid var(--green-dim);
    border-radius: 14px;
    font-size: 11px;
    color: var(--fg);
    background: rgba(111,255,142,0.05);
  }
  .badge-dot { color: var(--green); font-size: 10px; }

  /* ─── footer prompt ─── */
  .footer-prompt {
    margin-top: 36px;
    padding-top: 16px;
    border-top: 1px dashed var(--line);
  }
  .bye { color: var(--green-soft); margin-top: 6px; font-size: 13px; }

  /* ─── responsive ─── */
  @media (max-width: 780px) {
    .content { padding: 20px 18px 28px; }
    .ascii-art { font-size: 8px; }
    .contact-grid { grid-template-columns: 1fr; justify-items: center; text-align: center; }
    .contact-dl > div { grid-template-columns: 80px 1fr; }
    .proj-grid { grid-template-columns: 1fr; }
    .skills-row { grid-template-columns: 1fr; gap: 4px; }
    .xp-date { margin-left: 0; }
  }
  @media (max-width: 520px) {
    .title-bar { grid-template-columns: 60px 1fr 130px; }
    .tb-title { font-size: 10px; }
    .ascii-art { font-size: 6.5px; }
  }

  /* ─────────────────────────────────────────────────────
     PRINT — clean B&W single-column resume
     ───────────────────────────────────────────────────── */
  @media print {
    @page { size: Letter; margin: 0.55in; }
    body, html { background: #fff !important; color: #111 !important; }
    .crt-overlay, .scanlines, .vignette,
    .title-bar, .status-bar, .boot,
    .footer-prompt, .ascii-art,
    .frame-tl, .frame-tr, .frame-bl, .frame-br,
    .photo-cap, .qr-cap, .section-head .prompt-line .p-user,
    .section-head .prompt-line .p-at,
    .section-head .prompt-line .p-host,
    .section-head .prompt-line .p-colon,
    .section-head .prompt-line .p-path,
    .section-head .prompt-line .p-dollar { display: none !important; }

    .screen { padding: 0; }
    .window { border: none !important; box-shadow: none !important; max-width: 100%; }
    .content { padding: 0; }
    * { color: #111 !important; text-shadow: none !important; box-shadow: none !important; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 10.5pt; }

    /* Inject name/title at top */
    .content::before {
      content: "VISHNUPRIYA DUTTA";
      display: block;
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 26pt;
      font-weight: 700;
      letter-spacing: 0.01em;
      margin: 0 0 2px;
      color: #111 !important;
    }
    .content::after {
      content: "Cybersecurity Undergrad · Robert Morris University · Carnegie, PA · 412-209-9952 · vishnupriyadutta2006@gmail.com · linkedin.com/in/priya-dutta-55b2182b9";
      display: block;
      font-size: 9pt;
      color: #555 !important;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1.5px solid #111 !important;
    }

    .section {
      opacity: 1 !important; transform: none !important;
      page-break-inside: avoid;
      margin: 12px 0 10px;
    }
    .section-head {
      border: none !important;
      padding: 0;
      margin: 0 0 6px;
    }
    /* Build label from data-cmd via custom property fallback */
    .section[data-label]::before {
      content: attr(data-label);
      display: block;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 9pt;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #111 !important;
      border-bottom: 0.5px solid #999;
      padding-bottom: 3px;
      margin-bottom: 8px;
    }
    .summary { font-style: normal; font-size: 10.5pt; max-width: 100%; }
    .summary .kw { display: none; }

    .contact-card { border: none !important; background: none !important; padding: 0 !important; }
    .contact-grid { display: none; } /* covered by header line */

    .skills-row { grid-template-columns: 130px 1fr; gap: 8px; }
    .skills-cat { font-weight: 600; }
    .tag {
      border: 1px solid #888 !important;
      background: none !important;
      font-size: 9pt;
      padding: 1px 6px;
    }

    .xp-item { border-left: 2px solid #444 !important; }
    .xp-item::before { color: #111 !important; background: #fff !important; }
    .xp-role { font-weight: 700; }
    .xp-bullets li { font-size: 10pt; }
    .bul { color: #444 !important; }

    .proj-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .proj { border: 1px solid #bbb !important; background: none !important; }

    .badge { border: 1px solid #888 !important; background: none !important; }
    .awards-tbl tr { border-bottom: 1px dotted #aaa !important; }
  }
</style>
</head>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
